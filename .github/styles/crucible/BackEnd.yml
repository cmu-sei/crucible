# Enforces correct usage of "back-end" and "back end" and bans the closed form.
#
# Rationale: Per the SEI Spelling List and the Chicago Manual of Style:
#   - "back-end" (hyphenated) is the adjective form used before a noun:
#     e.g., "a back-end service", "back-end development"
#   - "back end" (no hyphen) is the noun form:
#     e.g., "configure the back end"
#   - "backend" (no hyphen or space) is never correct in formal writing.
#
# This rule catches the closed form. Hyphenation context (noun vs. adjective)
# is enforced by editorial review, as it requires grammatical context.
extends: substitution
message: "Use 'back-end' (adjective) or 'back end' (noun) instead of '%s'."
ignorecase: true
level: error
action:
  name: replace
swap:
  "backend": "back-end or back end"
