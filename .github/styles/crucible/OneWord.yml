# Description: Enforces correct compound word forms (one word, two words, or hyphenated)
extends: substitution
message: "'%s' should be written as '%s'."
level: error
ignorecase: true
swap:
  "data set": "dataset"
  "end point": "endpoint"
  "datapoint": "data point"
  "object oriented": "object-oriented"
  "webserver": "web server"
