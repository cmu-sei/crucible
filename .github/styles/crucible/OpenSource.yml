# Enforces "open source" without a hyphen, even when used as a compound modifier.
#
# Rationale: The Open Source Initiative (OSI) consistently writes "open source"
# without a hyphen in all contexts, including before a noun (e.g., "open source
# software"). We follow OSI's convention to stay consistent with the broader
# open source community and industry usage.
extends: substitution
message: "Use 'open source' (no hyphen) instead of '%s'."
ignorecase: true
level: error
action:
  name: replace
swap:
  "open-source": "open source"
