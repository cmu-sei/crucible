name: Lint and Build Docs

on:
  pull_request:
  workflow_call:

jobs:
  lint-and-build:
    name: Lint and build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Vale
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo errata-ai/vale --pattern "vale_*_Linux_64-bit.tar.gz" -O vale.tar.gz
          tar -xzf vale.tar.gz vale

      - name: Run Vale
        run: ./vale .

      - uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: "**/*.md"

      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install mkdocs-material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build
